<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Kelvin Wong</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #000;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .container {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    img {
      max-height: 95vh;
      max-width: 95vw;
      height: auto;
      width: auto;
      border-radius: 8px;
      display: block;
      box-shadow: 0 0 25px rgba(0, 255, 255, 0.35);
    }

    .footer {
      position: fixed;
      bottom: 15px;
      width: 100%;
      text-align: center;
      font-size: 12px;
      color: #777;
      font-style: italic;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- IMPORTANT: this filename MUST match the PNG name in the repo -->
    <img src="kw-knight.png" alt="Kelvin Wong Knight Emblem" />
  </div>

  <div class="footer">
    © Kelvin Wong — Personal Crest. All rights reserved.
  </div>

</body>
</html>
